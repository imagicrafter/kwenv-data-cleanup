<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
    form { display: flex; gap: 8px; }
    input[type="password"] { padding: 10px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; width: 240px; outline: none; }
    input[type="password"]:focus { border-color: #6b7280; }
    button { padding: 10px 20px; border: none; border-radius: 8px; background: #374151; color: white; font-size: 14px; font-weight: 500; cursor: pointer; }
    button:hover { background: #1f2937; }
  </style>
</head>
<body>
  <form id="pagecrypt-form">
    <input type="password" id="pagecrypt-password" placeholder="Passcode" autofocus />
    <button type="submit">Go</button>
  </form>
</body>
</html>
